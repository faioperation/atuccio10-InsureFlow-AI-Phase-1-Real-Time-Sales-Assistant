# ==============================================================
# Nginx Reverse Proxy – InsureFlow Production Configuration
# ==============================================================
# Routes:
#   /           → Next.js frontend  (port 3000)
#   /api/       → Orchestrator      (port 5050)
#   /ai/        → AI Agent          (port 5051)
#
# WebSocket upgrade is handled for /api/media-stream,
# /api/transcript-stream, and /ai/transcript-stream.
#
# Place SSL certificates in /etc/nginx/certs/ or use
# Certbot to obtain Let's Encrypt certs automatically.
# ==============================================================

upstream frontend {
    server frontend:3000;
}

upstream orchestrator {
    server orchestrator:5050;
}

upstream ai_agent {
    server ai_agent:5051;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow ACME challenge for Let's Encrypt.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://System.Management.Automation.Internal.Host.InternalHost;
    }
}

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL certificates (replace with your real cert paths).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend (Next.js) ───────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;

        # Next.js hot-reload WebSocket (dev mode).
        proxy_set_header Upgrade    ;
        proxy_set_header Connection "upgrade";
    }

    # ── Orchestrator API & WebSockets ────────────────────────
    location /api/ {
        proxy_pass http://orchestrator/;
        proxy_http_version 1.1;
        proxy_set_header Host              System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;

        # WebSocket support (Twilio media-stream, transcript-stream).
        proxy_set_header Upgrade    ;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── AI Agent WebSocket ───────────────────────────────────
    location /ai/ {
        proxy_pass http://ai_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host              System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;

        # WebSocket support.
        proxy_set_header Upgrade    ;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Increase max body size for audio payloads.
    client_max_body_size 10M;
}
