# ==============================================================
# InsureFlow AI Sales Assistant – Docker Compose (Production)
# ==============================================================
# Extends docker-compose.yml with production-specific settings.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================

services:

  orchestrator:
    restart: always
    environment:
      PORT: 5050
    # Do NOT expose port directly in production; Nginx proxies it.
    ports: []
    expose:
      - "5050"

  ai_agent:
    restart: always
    environment:
      AGENT_PORT: 5051
      ORCHESTRATOR_WS_URL: ws://orchestrator:5050/transcript-stream
    # Browser connects via wss://your-domain.com/ai/transcript-stream
    ports: []
    expose:
      - "5051"

  frontend:
    restart: always
    build:
      args:
        # In production the browser connects through Nginx reverse proxy (WSS).
        NEXT_PUBLIC_WS_URL: wss://your-domain.com/ai/transcript-stream
    ports: []
    expose:
      - "3000"

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: insureflow_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount Let's Encrypt certs (managed by Certbot on the host).
      - /etc/letsencrypt:/etc/nginx/certs:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - orchestrator
      - ai_agent
    networks:
      - insureflow_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
